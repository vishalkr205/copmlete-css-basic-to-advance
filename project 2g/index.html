<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Cart</title>
<link rel="stylesheet" href="./style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gravitas+One&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

    <div class="header">
    <h1>Shopping Cart (3)</h1>
    </div>

    <div class="cart-layout">

    <!-- LEFT SIDE -->
    <div class="cart-items">

        <div class="cart-item">
        <img src="./snap cam.webp" alt="">
        <div class="product-info">
            <h3>Polaroid Snap Touch</h3>
            <p>Color: Red</p>
            </div>
            <div class="quantity">
            <button>-</button>
            <span>1</span>
            <button>+</button>
            </div>
            <div class="price">$99.89</div>
            <div class="remove">×</div>
        </div>

        <div class="cart-item">
            <img src="./xbox_one_s_textured_matt_yellow_controller_skins_2048x.webp" alt="">
            <div class="product-info">
            <h3>Xbox Matt One Controller</h3>
            <p>Color: Yellow</p>
            </div>
            <div class="quantity">
            <button>-</button>
            <span>1</span>
            <button>+</button>
            </div>
            <div class="price">$49.99</div>
            <div class="remove">×</div>
        </div>

        <div class="cart-item">
            <img src="./headphone.avif" alt="">
            <div class="product-info">
            <h3>JBL Wireless Headphones</h3>
            <p>Color: Dark Blue</p>
            </div>
            <div class="quantity">
            <button>-</button>
            <span>1</span>
            <button>+</button>
            </div>
            <div class="price">$71.69</div>
            <div class="remove">×</div>
        </div>

        <a href="#" class="back-btn">Back to Catalog</a>

        </div>

        <!-- RIGHT SIDE -->
        <div class="summary">
        <h2>Order Summary</h2>

        <div class="summary-row">
            <span>Subtotal</span>
            <span>$221.57</span>
        </div>

        <div class="summary-row">
            <span>Delivery</span>
            <span>$15</span>
        </div>

        <div class="summary-row">
            <span>Pickup</span>
            <span>Free</span>
        </div>

        <div class="summary-row">
            <span>Promo Code</span>
            <span>-$35.48</span>
        </div>

        <div class="summary-row">
            <span>Tax</span>
            <span>7%</span>
        </div>

        <div class="summary-row total">
            <span>Total</span>
            <span>$199.11</span>
        </div>

        <button class="checkout-btn">Checkout</button>
        </div>

    </div>
</div>

</body>
</html>
